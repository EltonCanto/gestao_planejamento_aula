version: '3.8'

services:
  web:
    build: .
    container_name: gestao_aulas_web
    restart: unless-stopped
    ports:
      - "80:8000"
    env_file:
      - .env
    volumes:
      # Volume para o banco de dados SQLite persistir após recriação do container
      - db_data:/app/db
      # Volume para arquivos gerados e upados não sumirem
      - media_data:/app/media
      # Volumes para o Google Drive funcionar e o token persistir
      - ./token.json:/app/token.json
      - ./client_secret_515767878524-kidm2nv1qbc2rp4gcj6r52rghch7mojh.apps.googleusercontent.com.json:/app/client_secret_515767878524-kidm2nv1qbc2rp4gcj6r52rghch7mojh.apps.googleusercontent.com.json
    environment:
      # Informamos ao Django onde o SQLite deve ficar (dentro do volume montado /app/db/)
      - DATABASE_URL=sqlite:////app/db/db.sqlite3

volumes:
  db_data:
    name: gestao_aulas_db
  media_data:
    name: gestao_aulas_media
