version: '3.8'

services:
  web:
    build: .
    container_name: gestao_aulas_web
    restart: unless-stopped
    ports:
      - "80:8000"
    environment:
      # Informamos ao Django onde o SQLite deve ficar (dentro do volume montado /app/db/)
      - DATABASE_URL=sqlite:////app/db/db.sqlite3
      # Variáveis injetadas pelo Portainer
      - DJANGO_DEBUG
      - DJANGO_SECRET_KEY
      - DJANGO_ALLOWED_HOSTS
      - DJANGO_CSRF_TRUSTED_ORIGINS
      - OPENROUTER_API_KEY
      - GOOGLE_DRIVE_TOKEN_JSON
      - GOOGLE_DRIVE_CLIENT_SECRET_JSON
    volumes:
      # Volume para o banco de dados SQLite persistir após recriação do container
      - db_data:/app/db
      # Volume para arquivos gerados e upados não sumirem
      - media_data:/app/media



volumes:
  db_data:
    name: gestao_aulas_db
  media_data:
    name: gestao_aulas_media
